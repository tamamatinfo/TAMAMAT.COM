    <main class="main py-5" style="margin-top: 100px">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <form
              action="forms/contact.php"
              method="post"
              class="php-email-form"
              data-aos="fade-up"
              data-aos-delay="200"
            >
              <div class="row gy-4">
                <h3>Leave your details and we'll get in touch.</h3>
                <div class="col-md-6">
                  <label for="firstname" class="required-label"
                    >First Name <span class="required-star">*</span></label
                  >
                  <input
                    type="text"
                    name="firstname"
                    id="firstname"
                    class="form-control"
                    required=""
                  />
                </div>
                <div class="col-md-6">
                  <label for="lastname" class="required-label"
                    >Last Name <span class="required-star">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control"
                    name="lastname"
                    id="lastname"
                    required=""
                  />
                </div>
                <div class="col-md-6">
                  <label for="phone" class="required-label"
                    >Phone Number <span class="required-star">*</span></label
                  >
                  <input
                    type="tel"
                    class="form-control"
                    name="phone"
                    id="phone"
                    required=""
                  />
                </div>
                <div class="col-md-6">
                  <label for="email" class="required-label"
                    >Your Email <span class="required-star">*</span></label
                  >
                  <input
                    type="email"
                    class="form-control"
                    name="email"
                    id="email"
                    required=""
                  />
                </div>
                <div class="col-12">
                  <label for="messenger" class="required-label"
                    >Preferred Messenger</label
                  >
                  <select class="form-control" name="messenger" id="messenger">
                    <option value="" selected=""></option>
                    <option value="Telegram">Telegram</option>
                    <option value="WhatsApp">WhatsApp</option>
                    <option value="Facebook Messenger">
                      Facebook Messenger
                    </option>
                  </select>
                </div>
                <div class="col-12" id="username-field" style="display: none">
                  <input
                    type="text"
                    class="form-control"
                    name="username"
                    placeholder="Username or Phone Number for Preferred Messenger"
                  />
                </div>
                <div class="col-12">
                  <label for="subject" class="required-label"
                    >What do you teach?</label
                  >
                  <select class="form-control" name="subject" id="subject">
                    <option value="" selected=""></option>
                    <option value="Languages">Languages</option>
                    <option value="Math">Math</option>
                    <option value="Science">Science</option>
                    <option value="Test Preparation">Test Preparation</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <div class="col-12">
                  <label for="message" class="required-label">Message</label>
                  <textarea
                    class="form-control"
                    name="message"
                    id="message"
                    rows="4"
                  ></textarea>
                </div>
                <div class="col-12 text-center">
                  <div class="loading">Loading</div>
                  <div class="error-message"></div>
                  <div class="sent-message">
                    Your message has been sent. Thank you!
                  </div>
                  <button type="submit" class="btn-getstarted">Send Message</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>

    <script>
      document
        .getElementById("messenger")
        .addEventListener("change", function () {
          var usernameField = document.getElementById("username-field");

          } else {
            usernameField.style.display = "none";
